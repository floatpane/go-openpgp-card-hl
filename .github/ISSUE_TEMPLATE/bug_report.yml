name: Bug Report
description: Create a report to help us improve
title: "BUG: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior. A minimal Go snippet, the input bytes, or a failing test is ideal.
      placeholder: |
        1. card, _ := cardhl.Open()
        2. card.Sign(payload, pin, pub) with '...'
        3. See output / error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen. If a signature or message disagrees with `gpg`/`sq`, paste that output.
    validations:
      required: true

  - type: dropdown
    id: operation
    attributes:
      label: Operation
      options:
        - Sign
        - Decrypt
        - Info / ListKeys
        - Open / card connection
        - Public key parsing
        - Other / unsure
    validations:
      required: true

  - type: input
    id: lib-version
    attributes:
      label: go-openpgp-card-hl version
      placeholder: "e.g. v0.1.0 or commit SHA"

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: "Run `go version` to find out."
      placeholder: "e.g. go1.26.3"

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "e.g. Arch Linux, Ubuntu 24.04, macOS 14, Windows 11"

  - type: input
    id: card
    attributes:
      label: Card / reader
      description: Model and firmware if known.
      placeholder: "e.g. YubiKey 5C NFC fw 5.7.1, Nitrokey 3, built-in CCID reader"

  - type: dropdown
    id: key-algo
    attributes:
      label: Key algorithm
      description: The algorithm of the slot involved.
      options:
        - Ed25519 (EdDSA)
        - "ECDSA: NIST P-256"
        - "ECDSA: NIST P-384 / P-521"
        - RSA 2048
        - RSA 4096
        - "ECDH / Curve25519 (decryption)"
        - Other / unsure

  - type: input
    id: pcsc
    attributes:
      label: PC/SC stack
      placeholder: "e.g. pcscd 2.2.0 + libccid, macOS built-in, Windows WinSCard"

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
