# Path → label rules for actions/labeler@v6 (PR file paths).

"area/sign":
  - changed-files:
      - any-glob-to-any-file:
          - sign.go
          - sign_test.go

"area/decrypt":
  - changed-files:
      - any-glob-to-any-file:
          - decrypt.go
          - decrypt_test.go

"area/card":
  - changed-files:
      - any-glob-to-any-file:
          - card.go
          - card_test.go
          - doc.go

"area/keys":
  - changed-files:
      - any-glob-to-any-file:
          - keys.go
          - keys_test.go

"area/errors":
  - changed-files:
      - any-glob-to-any-file:
          - errors.go

"area/docs":
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - README.md
          - "**/*.md"

"area/ci":
  - changed-files:
      - any-glob-to-any-file:
          - .goreleaser*.yml
          - .golangci.yml

"ci":
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - .github/labeler-config.yml
          - .github/labeler-config-pr.yml
          - .github/labels.yml
          - .github/pr-paths.yml
          - .github/release.yml

"dependencies":
  - changed-files:
      - any-glob-to-any-file:
          - go.mod
          - go.sum
          - docs/package.json
          - docs/package-lock.json
