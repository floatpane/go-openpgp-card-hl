# Keyword regex labels for issues. PRs use labeler-config-pr.yml + pr-paths.yml.

"bug": '\b([Bb]ug(s)?|[Ff]ix(es)?)\b'

"enhancement": '\b([Ff]eat(s)?)\b'

"documentation": '\b([Dd]ocumentation|[Dd]ocs|[Rr]eadme)\b'

"question": '\b([Qq]uestion(s)?|[Hh]elp|[Hh]ow to)\b'

"performance": '\b([Pp]erformance|[Oo]ptimiz(e|ation)|[Ss]peed|[Tt]hroughput|[Ll]atency)\b'

"dependencies": '([Cc]hore\(deps\)|[Ff]ix\(deps\))'

"ci": '\b([Cc]i|[Cc]ontinuous integration|[Bb]uild|[Ww]orkflow)\b'

"chore": '\b([Cc]hore|[Mm]aintenance|[Rr]efactor|[Cc]leanup)\b'

"security": '\b([Ss]ecurity|[Pp]ermissions|PIN|[Vv]ulnerabilit(y|ies)|[Cc][Vv][Ee]|[Ff]orger(y|ies)|[Oo]racle)\b'

"os/windows": '\b([Ww]indows|[Ww]in(10|11)|[Mm]icrosoft|[Cc]md|[Pp]ower[Ss]hell)\b'

"os/linux": '\b([Ll]inux|[Uu]buntu|[Dd]ebian|[Ff]edora|[Aa]rch [Ll]inux|[Nn]ix[Oo][Ss]|pcscd|systemd)\b'

"os/macos": '\b([Mm]ac[Oo][Ss]?|[Oo][Ss] ?[Xx]|[Dd]arwin|[Mm]acbook)\b'

"hw/yubikey": '\b([Yy]ubi[Kk]ey|[Yy]ubico)\b'

"hw/nitrokey": '\b([Nn]itrokey)\b'

"hw/other-card": '\b([Ss]martcard|[Cc]ard [Rr]eader|PC/?SC|CCID|[Oo]pen[Pp][Gg][Pp] [Cc]ard)\b'

"area/sign": '\b([Ss]ign(ing|ature)?|MPI|[Ss]ubpacket|EdDSA|ECDSA|[Dd]etached)\b'

"area/decrypt": '\b([Dd]ecrypt(ion)?|DECIPHER|[Ss]ession key|PKESK|ECDH|[Cc]urve25519)\b'

"area/card": '\b([Pp]cscd|PC/?SC|[Rr]eader|[Cc]ardholder|[Ss]erial|[Ll]ist[- ]?keys|Info)\b'

"area/keys": '\b([Pp]ublic key|[Kk]eyring|[Ff]ingerprint|[Aa]rmor|[Ss]ubkey)\b'

"area/errors": '\b([Ee]rror message|[Ss]entinel|errors\.Is|ErrNo|ErrPIN)\b'

"area/docs": '\b([Dd]ocumentation|[Dd]ocs|[Rr]eadme)\b'

"area/ci": '\b([Cc]i|[Bb]uild|[Mm]akefile|[Gg]oreleaser)\b'
